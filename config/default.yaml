resolution:
  width: 1920
  height: 1080

fps: 30
sample_every_n_frames: 1

# ROI coordinates for tournament stream recordings (Spaghetti Showdown overlay).
# The health bar extractor and scene detector read from the full frame
# at hardcoded positions (y=118-138) and don't use these ROIs.
# These ROIs are used by the timer extractor and future extractors.
rois:
  p1_health_bar:
    x1: 100
    y1: 118
    x2: 960
    y2: 138
  p2_health_bar:
    x1: 960
    y1: 118
    x2: 1860
    y2: 138
  timer:
    x1: 880
    y1: 100
    x2: 1040
    y2: 180
  timer_digits:
    x1: 920
    y1: 115
    x2: 1000
    y2: 165
  p1_tension_bar:
    x1: 50
    y1: 1040
    x2: 440
    y2: 1058
  p2_tension_bar:
    x1: 1480
    y1: 1040
    x2: 1870
    y2: 1058

health_bar:
  background_threshold: 80
  min_delta_pct: 0.005
  smoothing_window: 3
