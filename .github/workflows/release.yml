name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 2026.3.16-preview.3). Leave empty to use version from tauri.conf.json."
        required: false
        type: string

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg
          - platform: macos-13
            target: x86_64-apple-darwin
            bundles: dmg
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            VER=$(sed -n 's/.*"version":[[:space:]]*"\([^"]*\)".*/\1/p' app/src-tauri/tauri.conf.json | head -1)
            echo "version=$VER" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: app
          tauriScript: npx tauri
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: |
            app/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            app/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe.sig
            app/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            app/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg.sig
            app/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            app/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.sig
            app/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
          if-no-files-found: ignore

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            VER=$(sed -n 's/.*"version":[[:space:]]*"\([^"]*\)".*/\1/p' app/src-tauri/tauri.conf.json | head -1)
            echo "version=$VER" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Generate latest.json
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BASE_URL="https://github.com/TimesUp94/spaghettilab/releases/download/v${VERSION}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # Helper: read .sig file content, empty string if missing
          read_sig() {
            local f="$1"
            if [ -f "$f" ]; then cat "$f"; else echo ""; fi
          }

          # Find artifacts (they may be nested under bundle subdirs)
          WIN_EXE=$(find artifacts -name "*.exe" ! -name "*.sig" | head -1)
          MAC_ARM_DMG=$(find artifacts -path "*aarch64*" -name "*.dmg" ! -name "*.sig" | head -1)
          MAC_X64_DMG=$(find artifacts -path "*x86_64*" -name "*.dmg" ! -name "*.sig" | head -1)
          LINUX_APPIMAGE=$(find artifacts -name "*.AppImage" ! -name "*.sig" | head -1)

          # Build platforms JSON
          PLATFORMS="{"

          if [ -n "$WIN_EXE" ]; then
            WIN_NAME=$(basename "$WIN_EXE")
            WIN_SIG=$(read_sig "${WIN_EXE}.sig")
            PLATFORMS="$PLATFORMS\"windows-x86_64\":{\"signature\":\"$WIN_SIG\",\"url\":\"$BASE_URL/$WIN_NAME\"}"
          fi

          if [ -n "$MAC_ARM_DMG" ]; then
            MAC_ARM_NAME=$(basename "$MAC_ARM_DMG")
            MAC_ARM_SIG=$(read_sig "${MAC_ARM_DMG}.sig")
            [ "$PLATFORMS" != "{" ] && PLATFORMS="$PLATFORMS,"
            PLATFORMS="$PLATFORMS\"darwin-aarch64\":{\"signature\":\"$MAC_ARM_SIG\",\"url\":\"$BASE_URL/$MAC_ARM_NAME\"}"
          fi

          if [ -n "$MAC_X64_DMG" ]; then
            MAC_X64_NAME=$(basename "$MAC_X64_DMG")
            MAC_X64_SIG=$(read_sig "${MAC_X64_DMG}.sig")
            [ "$PLATFORMS" != "{" ] && PLATFORMS="$PLATFORMS,"
            PLATFORMS="$PLATFORMS\"darwin-x86_64\":{\"signature\":\"$MAC_X64_SIG\",\"url\":\"$BASE_URL/$MAC_X64_NAME\"}"
          fi

          if [ -n "$LINUX_APPIMAGE" ]; then
            LINUX_NAME=$(basename "$LINUX_APPIMAGE")
            LINUX_SIG=$(read_sig "${LINUX_APPIMAGE}.sig")
            [ "$PLATFORMS" != "{" ] && PLATFORMS="$PLATFORMS,"
            PLATFORMS="$PLATFORMS\"linux-x86_64\":{\"signature\":\"$LINUX_SIG\",\"url\":\"$BASE_URL/$LINUX_NAME\"}"
          fi

          PLATFORMS="$PLATFORMS}"

          # Write latest.json
          cat > latest.json <<EOF
          {
            "version": "v${VERSION}",
            "notes": "Update to v${VERSION}",
            "pub_date": "${PUB_DATE}",
            "platforms": ${PLATFORMS}
          }
          EOF

          # Pretty-print for debugging
          cat latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          prerelease: true
          generate_release_notes: true
          files: |
            artifacts/**/*.exe
            artifacts/**/*.exe.sig
            artifacts/**/*.dmg
            artifacts/**/*.dmg.sig
            artifacts/**/*.AppImage
            artifacts/**/*.AppImage.sig
            artifacts/**/*.deb
            latest.json
